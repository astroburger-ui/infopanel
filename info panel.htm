    /* Base styles */
    body {
      margin: 0;
      padding: 10px;
      font-family: Arial, sans-serif;
      transition: background-color 0.3s, color 0.3s;
    }
    h1, h2 {
      text-align: center;
      margin-top: 2px;
      margin-bottom: 5px;

    /* Dark mode (default) */
    body.dark-mode {
      background-color: rgb(19, 31, 52);
      color: white;
    }
    body.dark-mode h1, 
    body.dark-mode h2 {
      color: white;
    }
    body.dark-mode .button {
      background-color: rgb(29, 43, 67);
      border: none;
      color: white;
      padding: 10px 15px;
      margin: 5px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 12px;
      cursor: pointer;
      border-radius: 5px;
      transition: background-color 0.3s;
    }
    body.dark-mode .button:hover {
      background-color: rgb(46, 68, 103);
    }
    
    /* Light mode */
    body.light-mode {
      background-color: rgb(235, 237, 240);
      color: black;
    }
    body.light-mode h1, 
    body.light-mode h2 {
      color: black;
    }
    body.light-mode .button {
      background-color: rgb(201, 216, 236);
      border: none;
      color: black;
      padding: 10px 15px;
      margin: 5px;
      text-align: center;
      text-decoration: none;
      display: inline-block;
      font-size: 12px;
      cursor: pointer;
      border-radius: 5px;
      transition: background-color 0.3s, color 0.3s;
    }
    body.light-mode .button:hover {
      background-color: rgb(37, 55, 83);
      color: white;
    }
    
    /* Toggle button styling in the top right corner */
    #modeToggle {
      position: fixed;
      top: 5px;
      right: 10px;
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      outline: none;
      color: inherit;
    }
    
    /* Section spacing */
    .section {
      margin-bottom: 5px;
    }
  </style>

  <script>
    const toggleBtn = document.getElementById('modeToggle');
    const body = document.body;

    toggleBtn.addEventListener('click', () => {
      if (body.classList.contains('dark-mode')) {
        body.classList.remove('dark-mode');
        body.classList.add('light-mode');
        toggleBtn.textContent = '🌙';
      } else {
        body.classList.remove('light-mode');
        body.classList.add('dark-mode');
        toggleBtn.textContent = '☀';
      }
    });
  </script>
