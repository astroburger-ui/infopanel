<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5">
    <title>Kontrastberegning for MRA 1,5T</title>
    <style>
        body { background-color: rgb(19, 31, 52); color: white; font-family: Arial, sans-serif; font-size: 100%; margin: 0; padding: 5px; }
        .button { background-color: rgb(46, 68, 103); border: none; color: white; padding: 2px 2px; margin: 0px; text-align: center; text-decoration: none; font-size: 18px; cursor: pointer; border-radius: 5px; }
        .button:hover { background-color: rgb(29, 43, 67); }
        .content-wrapper { margin-top: 20px; padding: 10px; }
        ::-webkit-scrollbar { width: 0px; }
        .round-button-container { display: flex; flex-wrap: wrap; justify-content: flex-start; margin: 0px 0; width: 100%; margin-left: 0px; }
        .round-button { background-color: rgb(29, 43, 67); border: none; color: white; padding: 5px 10px; margin: 2px; text-align: center; text-decoration: none; display: inline-block; font-size: 12px; cursor: pointer; border-radius: 5px; transition: background-color 0.3s; }
        .round-button:hover { background-color: rgb(46, 68, 103); }
        .round-button.active { background-color: rgb(46, 68, 103); }
        input { height: 20px; width: 120px; margin-left: 0px; font-size: 17px; margin-right: 10px; text-align: center; }
        p span { margin-left: 10px; margin-right: 20%; }
        .top-bar-container { display: flex; justify-content: space-evenly; align-items: flex-start; margin-bottom: 5px; position: sticky; top: 0; background-color: rgb(19, 31, 52); z-index: 10; padding: 5px 0; }
        .flex-container {
            display: flex;
            align-items: flex-start;
            margin-right: 20%;
            margin: 5px 0px;
        }
    </style>
</head>
<body>
    <div style="margin-bottom: 0px; margin-bottom: 0px;" class="top-bar-container">
        <div style="margin-bottom: 0px;" class="round-button-container">
            <a href="MRA15.htm" class="round-button">MRA</a>
            <a href="Abd.htm" class="round-button">Abd</a>
            <a href="crt.htm" class="round-button active">CRT</a>
            <a href="../info panel.htm" class="round-button">🏠</a>
        </div>
    </div> 
    
         <div style="margin-top: 0px;"><p>Posisjonsberegning for kortaksesnitt</p></div>
        <div style="margin-bottom: 20px;" >
            <input title="basal" step="5" placeholder="basal" type="number" id="basal" oninput="calculate()">
          
        
        
        </div>
        <div class="flex-container">
            <label style="font-size: small;" for="mellom">Mellom:</label>
            <span id="mellom"></span>
        </div>
        <div style="font-size: x-large; margin: 10px 0px;" class="flex-container">
            <label for="midt">Midt:</label>
            <span id="midt"></span>
        </div>
        <div style="margin-bottom: 0px; font-size: small;" class="flex-container">
            <label for="mellom2">Mellom:</label>
            <span id="mellom2"></span>
        </div>
          <div style="margin-bottom: 10px; margin-top: 0px;" >
          <br>
             <input title="apikal" step="5" placeholder="apikal" type="number" id="apikal" oninput="calculate()"><br>
        </div>
    </div>
    
    <script>
        function calculate() {
            var basal = parseFloat(document.getElementById('basal').value) || 0;
            var apikal = parseFloat(document.getElementById('apikal').value) || 0;
            var midt = (basal + apikal) / 2;
            var mellom = (basal + midt) / 2;
            var mellom2 = (midt + apikal) / 2;
            
            document.getElementById('midt').innerText = midt.toFixed(1);
            document.getElementById('mellom').innerText = mellom.toFixed(1);
            document.getElementById('mellom2').innerText = mellom2.toFixed(1);
            
        }
    </script>
</body>
</html>
