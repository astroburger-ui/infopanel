<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5">
    <title>Kontrastberegning for MRA 1,5T</title>
    <style>
        body { background-color: rgb(19, 31, 52); color: white; font-family: Arial, sans-serif; font-size: 80%; margin: 0; padding: 5px; }
        .button { background-color: rgb(46, 68, 103); border: none; color: white; padding: 2px 2px; margin: 0px; text-align: center; text-decoration: none; font-size: 18px; cursor: pointer; border-radius: 5px; }
        .button:hover { background-color: rgb(29, 43, 67); }
        .content-wrapper { margin-top: 20px; padding: 10px; }
        ::-webkit-scrollbar { width: 0px; }
        .round-button-container { display: flex; flex-wrap: wrap; justify-content: flex-start; margin: 0px 0; width: 100%; margin-left: 0px; }
        .round-button { background-color: rgb(29, 43, 67); border: none; color: white; padding: 5px 10px; margin: 2px; text-align: center; text-decoration: none; display: inline-block; font-size: 12px; cursor: pointer; border-radius: 5px; transition: background-color 0.3s; }
        .round-button:hover { background-color: rgb(46, 68, 103); }
        .round-button.active { background-color: rgb(46, 68, 103); }
        .dosetabell { font-size: 14px; }

        input { height: 20px; width: 125px; margin-left: 0px; font-size: 17px; margin-right: 10px; text-align: center; }
        p span { margin-left: 10px; margin-right: 20%; }
        .top-bar-container { display: flex; justify-content: space-evenly; align-items: flex-start; margin-bottom: 5px; position: sticky; top: 0; background-color: rgb(19, 31, 52); z-index: 10; padding: 5px 0; }
        .flex-container {
            display: flex;
            margin-right: 20px; /*  */
}

    </style>
</head>
<body>
    <div class="top-bar-container">
        <div class="round-button-container">
            <a href="" class="round-button active">MRA</a>
        <!--      <a href="MRA 3T.htm" class="round-button">MRA 3T</a> -->
             <a href="Abd.htm" class="round-button">Abd</a> 
        <!--     <a href="WIVI.htm" class="round-button">WIVI</a>  -->
             <a href="crt.htm" class="round-button">CRT</a> 
        <!--     <a href="ASSAIL-MI.htm" class="round-button">ASSAIL-MI</a> 
             <a href="Flash-IR.htm" class="round-button">Flash-IR</a> -->
             <a href="../info panel.htm" class="round-button">🏠</a>
        </div>
    </div>
    <div id="MRA 1,5T" class="toggle-content">
        <label for="vekt">Vekt (kg):</label>
        <input step="0.1" type="number" id="vekt" oninput="calculate()"><br>
        
        <div style="display: flex; justify-content: flex-start; margin-right: 70%; margin: 10px 0px;">
            <div style="margin-right: 20px;"><span class="dosetabell">ml/kg:</span><br><br><span class="dosetabell">ml:</span></div>
            <div style="margin-right: 20px;"><span class="dosetabell">0.1</span><br><br><span class="dosetabell" id="halv"></span></div>
            <div style="margin-right: 20px;"><span class="dosetabell">0.2</span><br><br> <span class="dosetabell" id="enkel"></span></div>
            <div style="margin-right: 20px;"><span class="dosetabell">0.3</span><br><br> <span class="dosetabell" id="halvannen"></span></div>
            <div style="margin-right: 20px;"><span class="dosetabell">0.4</span><br><br> <span class="dosetabell" id="dobbel"></span></div>
            <div style="margin-right: 20px;"><span class="dosetabell">0.6</span><br><br> <span class="dosetabell" id="trippel"></span></div>
        </div>
      <!--   <div style="display: flex; justify-content: flex-start; margin-right: 70%; margin-bottom: 0px; "><div><p style="margin-right: 75px; margin-bottom: 0px;">Opptakstid:</p></div><div><p>Kontrastdose:</p></div></div> -->
        <p style="display: flex; justify-content: flex-start; margin-right: 70%; margin-top: 0px;">
       <!-- <label for="opptakstid">Opptakstid (s):</label> -->
        
        <input type="number" title="Opptakstid" placeholder="Opptakstid" id="opptakstid" oninput="calculate()"><br>
       <!-- <label for="kontrastdose">Kontrastdose (ml):</label> -->
        <input type="number" step="0.1" title="Kontrastdose" type="text" placeholder="Kontrastdose" id="kontrastdose" oninput="calculate()"><br>
        </p>
         <p style="display: flex; justify-content: flex-start; margin-right: 230px;">
        <!-- <label for="timeToCenter">Time to center (s):</label> -->
        <input type="number" step="0.1" title="Time to center" type="text" placeholder="time to center" id="timeToCenter" oninput="calculate()"><br>
       <!--  <label for="sirkulasjonstid">Sirkulasjonstid (s):</label> -->
        <input type="number" title="Sirkulasjonstid" type="text" placeholder="Sirkulasjonstid" id="sirkulasjonstid" oninput="calculate()"><br>
        </p>
        <p title="= halve opptakstiden" style="display: flex; justify-content: space-between; margin-right: 30%;">Optimal boluslengde: <span id="optimalBoluslengde"></span></p>
        <p title="= kontrastdose / optimal boluslengde" class="delay-label" style="display: flex; justify-content: space-between; margin-right: 30%; font-size: 18px;">Flow (ml/s): <span id="flow" ></span></p>
         
       
        <p title="= sirkulasjonstid + (boluslengde/2) - time to center" class="delay-label" style="display: flex; justify-content: space-between; margin-right: 30%; font-size: 18px;">Delay (s): <span class="delay-result" id="delay" title="Delay = sirkulasjonstid + 50% inj.tid - time to centre" style="font-size: 18px;"></span></p>
        <p>Flow mellom 1,5 ml/s og 3,5 ml/s<br><br>>70kg 2 ml testbolus (1 ml for 3T)<br><70kg 1 ml testbolus<br><br>bolus, dose, flow, høyde og vekt dokumenteres</p>
            <p style="display: flex; justify-content: space-between; visibility: hidden;">Injeksjonstid (s): <span id="injeksjonstid"></span></p>
    </div>
    <script>
        function calculate() {
            var vekt = parseFloat(document.getElementById('vekt').value) || 0;
            document.getElementById('halv').innerText = (vekt * 0.1).toFixed(1);
            document.getElementById('enkel').innerText = (vekt * 0.2).toFixed(1);
            document.getElementById('halvannen').innerText = (vekt * 0.3).toFixed(1);
            document.getElementById('dobbel').innerText = (vekt * 0.4).toFixed(1);
            document.getElementById('trippel').innerText = (vekt * 0.6).toFixed(1);
            var opptakstid = parseFloat(document.getElementById('opptakstid').value) || 0;
            var kontrastdose = parseFloat(document.getElementById('kontrastdose').value) || 0;
            var optimalBoluslengde = opptakstid * 0.5;
            document.getElementById('optimalBoluslengde').innerText = optimalBoluslengde;
            var flow = kontrastdose / optimalBoluslengde;
            document.getElementById('flow').innerText = flow.toFixed(1);
            var injeksjonstid = kontrastdose / flow;
            document.getElementById('injeksjonstid').innerText = injeksjonstid;
            var timeToCenter = parseFloat(document.getElementById('timeToCenter').value) || 0;
            var sirkulasjonstid = parseFloat(document.getElementById('sirkulasjonstid').value) || 0;
            var delay = sirkulasjonstid + (injeksjonstid / 2) - timeToCenter;
            document.getElementById('delay').innerText = delay.toFixed(1);
        }
    </script>
</body>
</html>
